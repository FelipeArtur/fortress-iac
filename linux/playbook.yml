---
- name: Fortress IaC Deployment (Adult Shield & SafeSearch)
  hosts: localhost # Can be changed to 'all' for fleet deployment
  connection: local
  become: true # Requires root privileges (sudo)
  
  tasks:
    - name: 1. Install the blocking engine in /usr/local/sbin/
      ansible.builtin.copy:
        src: files/fortress-update
        dest: /usr/local/sbin/fortress-update
        owner: root
        group: root
        mode: '0755'

    - name: 2. Deploy the Systemd Service Unit
      ansible.builtin.copy:
        src: files/fortress-update.service
        dest: /etc/systemd/system/fortress-update.service
        owner: root
        group: root
        mode: '0644'
      notify: Reload Systemd

    - name: 3. Deploy the Time Trigger (Timer)
      ansible.builtin.copy:
        src: files/fortress-update.timer
        dest: /etc/systemd/system/fortress-update.timer
        owner: root
        group: root
        mode: '0644'
      notify: Reload Systemd

    - name: 4. Enable and start the automatic update Timer
      ansible.builtin.systemd:
        name: fortress-update.timer
        enabled: true
        state: started

  handlers:
    - name: Reload Systemd
      ansible.builtin.systemd:
        daemon_reload: true
